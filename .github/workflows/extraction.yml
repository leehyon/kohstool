name: Tool Extraction

on:
  push:
    branches:
      - main
    paths:
      # Only rerun when the tool link list changes.
      - 'README.md'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  summarize:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout kohstool
        uses: actions/checkout@v4

      - name: Checkout kohstool-guide
        uses: actions/checkout@v4
        with:
          repository: leehyon/kohstool-guide
          path: kohstool-guide
          token: ${{ secrets.PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'
          cache-dependency-path: kohstool-guide/requirements.txt
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r kohstool-guide/requirements.txt

      - name: Process changes
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_MODEL: ${{ vars.OPENAI_API_MODEL }}
          OPENAI_API_ENDPOINT: ${{ vars.OPENAI_API_ENDPOINT }}
        run: |
          python kohstool-guide/process_changes.py --collection-readme README.md

      - name: Upload data.json artifact
        uses: actions/upload-artifact@v4
        with:
          name: kohstool-data-json
          path: kohstool-guide/data.json
          if-no-files-found: error

      - name: Commit changes to kohstool-guide
        run: |
          cd kohstool-guide
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "ci: add new tools" || echo "No changes to commit"

      - name: Pull and push
        run: |
          cd kohstool-guide
          git fetch origin main
          git merge origin/main --no-edit || echo "Already up to date"
          git push

  site_sync:
    needs: summarize
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Download data.json artifact
        uses: actions/download-artifact@v4
        with:
          name: kohstool-data-json
          path: artifact

      - name: Checkout tools repo
        uses: actions/checkout@v4
        with:
          repository: leehyon/tools
          path: tools
          token: ${{ secrets.PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update site data.json
        run: |
          mkdir -p tools/public
          cp artifact/data.json tools/public/data.json

      - name: Install dependencies and build search index
        run: |
          cd tools
          npm ci
        env:
          EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
          EMBEDDING_MODEL: ${{ vars.EMBEDDING_MODEL || 'bge-m3' }}
          EMBEDDING_URL: ${{ vars.EMBEDDING_URL || 'https://model-square.app.baizhi.cloud/v1/embeddings' }}

      - name: Build search index
        run: |
          cd tools
          npm run build-search
        env:
          EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
          EMBEDDING_MODEL: ${{ vars.EMBEDDING_MODEL || 'bge-m3' }}
          EMBEDDING_URL: ${{ vars.EMBEDDING_URL || 'https://model-square.app.baizhi.cloud/v1/embeddings' }}
          GITHUB_TOKEN: ${{ secrets.PAT }}

      - name: Commit and push site update
        run: |
          cd tools
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/data.json public/searchIndex.json public/embeddings.json
          git commit -m "chore: sync kohstool data and search index" || echo "No changes to commit"
          git push
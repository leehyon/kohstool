name: Tool Extraction

on:
  push:
    branches:
      - main
    paths:
      # Only rerun when the tool link list changes.
      - 'README.md'
  workflow_dispatch:

jobs:
  summarize:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout kohstool
        uses: actions/checkout@v4

      - name: Checkout kohstool-guide
        uses: actions/checkout@v4
        with:
          repository: leehyon/kohstool-guide
          path: kohstool-guide
          token: ${{ secrets.PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'
          cache-dependency-path: kohstool-guide/requirements.txt
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r kohstool-guide/requirements.txt

      - name: Process changes
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_MODEL: ${{ vars.OPENAI_API_MODEL }}
          OPENAI_API_ENDPOINT: ${{ vars.OPENAI_API_ENDPOINT }}
        run: |
          python kohstool-guide/process_changes.py --collection-readme README.md

      - name: Upload data.json artifact
        uses: actions/upload-artifact@v4
        with:
          name: kohstool-data-json
          path: kohstool-guide/data.json
          if-no-files-found: error

      - name: Commit changes to kohstool-guide
        run: |
          cd kohstool-guide
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "ci: add new tools" || echo "No changes to commit"

      - name: Pull and push
        run: |
          cd kohstool-guide
          git fetch origin main
          git merge origin/main --no-edit || echo "Already up to date"
          git push

  site_sync:
    needs: summarize
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Download data.json artifact
        uses: actions/download-artifact@v4
        with:
          name: kohstool-data-json
          path: artifact

      - name: Checkout site repo
        uses: actions/checkout@v4
        with:
          repository: leehyon/tools
          path: site
          token: ${{ secrets.PAT }}

      - name: Update site data.json
        run: |
          mkdir -p site/public
          cp artifact/data.json site/public/data.json

      - name: Commit and push site update
        run: |
          cd site
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/data.json
          git commit -m "chore: sync kohstool data.json" || echo "No changes to commit"
          git push
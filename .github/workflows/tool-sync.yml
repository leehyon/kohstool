name: Tool Extraction

on:
  push:
    branches:
      - main
    paths:
      # Only rerun when the tool link list changes.
      - 'README.md'
      - '.github/workflows/tool-sync.yml'
  workflow_dispatch:
    inputs:
      mode:
        description: |
          Run mode (only used for manual workflow_dispatch; push events always run 'normal'):
          - normal: ingest the next new tool from README.md (one per run).
          - retry-broken: re-fetch + regenerate every entry whose guide file is missing or below MIN_GUIDE_BYTES (e.g. Jina failed earlier). Use --max-new to cap retries per run.
          - backfill: rebuild README/monthly indexes from existing data without fetching.
        type: choice
        required: true
        default: 'normal'
        options:
          - normal
          - retry-broken
          - backfill
      max_new:
        description: 'Max entries to process per run. Use a larger value (e.g. 10) with retry-broken to clear many broken entries in one go.'
        type: number
        required: false
        default: 1

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  summarize:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout kohstool
        uses: actions/checkout@v4

      - name: Checkout kohstool-guide
        uses: actions/checkout@v4
        with:
          repository: leehyon/kohstool-guide
          path: kohstool-guide
          token: ${{ secrets.SUMMARY_SYNC_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'
          cache-dependency-path: kohstool-guide/requirements.txt
      
      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r kohstool-guide/requirements.txt

      - name: Process changes
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          LLM_API_ENDPOINT: ${{ vars.LLM_API_ENDPOINT }}
        run: |
          set -euo pipefail
          # Build CLI flags from workflow_dispatch inputs. Push events get defaults.
          MODE="${{ inputs.mode || 'normal' }}"
          MAX_NEW="${{ inputs.max_new || 1 }}"
          EXTRA=""
          if [ "$MODE" = "retry-broken" ]; then
            EXTRA="--retry-broken"
          elif [ "$MODE" = "backfill" ]; then
            EXTRA="--backfill"
          fi
          echo "Mode: $MODE  Max-new: $MAX_NEW  Extra: $EXTRA"
          python kohstool-guide/process_changes.py --collection-readme README.md --max-new "$MAX_NEW" $EXTRA 2>&1 | tee process_changes.log

          # Defensive guardrail: if process_changes.py ever regresses to
          # swallowing fetch failures (logging but still exiting 0), fail the
          # workflow immediately and block downstream steps.
          if grep -Eq "All [0-9]+ retry attempts failed|failed to fetch page content|Aborting ingestion of" process_changes.log; then
            echo "ERROR: fetch/content extraction failed during Process changes." >&2
            exit 1
          fi

      - name: Validate data.json (no empty/missing guide files)
        # Guardrail: a fetch failure (e.g. Jina 403) used to fall through with
        # empty page_text and ship a near-empty TL;DR + tiny guide file.
        # Abort the run if any entry looks broken so site_sync is never seeded
        # with garbage.
        #
        # Only checks entries produced by THIS run (via .last_run.json written
        # by process_changes.py), so stale broken entries from earlier buggy
        # runs don't block the workflow forever.
        #
        # Threshold rationale: legitimate guide files cluster 800B+, broken
        # ones cluster 0-300B. 500B sits in the empty gap between them.
        run: |
          python - <<'PY'
          import json, os, re, sys

          DATA = "kohstool-guide/data.json"
          MANIFEST = "kohstool-guide/.last_run.json"
          GUIDE_ROOT = "kohstool-guide"
          MIN_GUIDE_BYTES = 500  # guide markdown file size on disk

          # Read the manifest of guide paths produced this run.
          if not os.path.exists(MANIFEST):
              print(f"ERROR: {MANIFEST} not found — did process_changes.py run?", file=sys.stderr)
              sys.exit(1)
          with open(MANIFEST, encoding="utf-8") as fh:
              manifest = json.load(fh)
          new_paths = set(manifest.get("guide_paths") or [])

          # Empty manifest = no new tools processed this run. Nothing to
          # validate; pre-existing entries (good or bad) are out of scope.
          if not new_paths:
              print("OK: no new entries produced this run; nothing to validate.")
              sys.exit(0)

          with open(DATA, encoding="utf-8") as fh:
              entries = json.load(fh)

          bad = []
          for e in entries:
              url = e.get("guide_markdown") or ""
              m = re.search(r"/blob/[^/]+/(.+)$", url)
              rel = m.group(1) if m else None
              if not rel:
                  continue
              # Match manifest path (which is absolute) by suffix so we don't
              # get tripped up by SUMMARY_ROOT resolution differences.
              full = os.path.join(GUIDE_ROOT, rel)
              if not any(p.endswith(rel) or p.endswith(os.path.join(GUIDE_ROOT, rel))
                         for p in new_paths):
                  continue
              size = os.path.getsize(full) if os.path.exists(full) else 0
              if size < MIN_GUIDE_BYTES:
                  bad.append((e.get("name"), size, rel))

          if bad:
              print(f"ERROR: {len(bad)} new entr{'y' if len(bad)==1 else 'ies'} "
                    f"have empty/missing guide file:", file=sys.stderr)
              for name, sz, p in bad:
                  print(f"  - {name}: guide={sz}B ({p})", file=sys.stderr)
              sys.exit(1)
          print(f"OK: all {len(new_paths)} new entr{'y' if len(new_paths)==1 else 'ies'} "
                f"have guide>={MIN_GUIDE_BYTES}B")
          PY

      - name: Upload data.json artifact
        uses: actions/upload-artifact@v4
        with:
          name: kohstool-data-json
          path: kohstool-guide/data.json
          if-no-files-found: error

      - name: Commit changes to kohstool-guide
        run: |
          set -euo pipefail
          cd kohstool-guide
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "false" > .has_changes
          else
            git commit -m "ci: add new tools"
            echo "true" > .has_changes
          fi

      - name: Pull and push
        run: |
          set -euo pipefail
          cd kohstool-guide
          if [ ! -f .has_changes ] || [ "$(cat .has_changes)" != "true" ]; then
            echo "Skip push: no new commit in this run"
            exit 0
          fi
          git fetch origin main
          git rebase origin/main
          git push

  site_sync:
    needs: summarize
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Download data.json artifact
        uses: actions/download-artifact@v4
        with:
          name: kohstool-data-json
          path: artifact

      - name: Checkout tools repo
        uses: actions/checkout@v4
        with:
          repository: leehyon/tools
          path: tools
          token: ${{ secrets.SUMMARY_SYNC_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update site data.json
        run: |
          set -euo pipefail
          mkdir -p tools/public
          cp artifact/data.json tools/public/data.json

      - name: Install dependencies
        run: |
          set -euo pipefail
          cd tools
          npm ci
        env:
          EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
          EMBEDDING_MODEL: ${{ vars.EMBEDDING_MODEL || 'bge-m3' }}
          EMBEDDING_API_ENDPOINT: ${{ vars.EMBEDDING_API_ENDPOINT || 'https://model-square.app.baizhi.cloud/v1/embeddings' }}

      - name: Build search index
        run: |
          set -euo pipefail
          cd tools
          npm run build-search
        env:
          EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
          EMBEDDING_MODEL: ${{ vars.EMBEDDING_MODEL || 'bge-m3' }}
          EMBEDDING_API_ENDPOINT: ${{ vars.EMBEDDING_API_ENDPOINT || 'https://model-square.app.baizhi.cloud/v1/embeddings' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push site update
        run: |
          set -euo pipefail
          cd tools
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/data.json public/searchIndex.json public/embeddings.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: sync kohstool data and search index"
          git fetch origin main
          git rebase origin/main
          git push